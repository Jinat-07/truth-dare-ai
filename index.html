<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth or Dare AI</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 3D card flip animation */
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; transition: transform 0.6s; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-4 font-sans text-gray-800">

    <!-- Main Container -->
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col items-center p-6 md:p-8">
        
        <h1 class="text-3xl font-bold text-gray-900 mb-1 tracking-tight">AI Truth or Dare</h1>
        <p class="text-gray-500 mb-6 text-center text-sm">Tailored prompts that instantly morph between Truth and Dare.</p>

        <!-- Configuration Settings Panel -->
        <div class="w-full space-y-4 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
            <!-- Subject/Theme Input -->
            <div>
                <label for="game-subject" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Game Subject / Theme</label>
                <input type="text" id="game-subject" placeholder="e.g., College Friends, Family, Tech Meetup" 
                    class="w-full px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-gray-800">
            </div>

            <!-- Vibe/Intensity Selector -->
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Vibe Level</label>
                <div class="grid grid-cols-3 gap-2" id="vibe-container">
                    <button data-vibe="friendly" class="vibe-btn py-1.5 px-3 rounded-lg text-xs font-medium border border-blue-500 bg-blue-50 text-blue-600 transition-all">
                        Friendly 😊
                    </button>
                    <button data-vibe="spicy" class="vibe-btn py-1.5 px-3 rounded-lg text-xs font-medium border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 transition-all">
                        Spicy 🔥
                    </button>
                    <button data-vibe="deep" class="vibe-btn py-1.5 px-3 rounded-lg text-xs font-medium border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 transition-all">
                        Deep 🧠
                    </button>
                </div>
            </div>
        </div>

        <!-- The Flip Card Area -->
        <div class="w-full h-64 perspective mb-6 cursor-pointer group">
            <div id="card-inner" class="relative w-full h-full preserve-3d">
                
                <!-- Front of Card (Truth) -->
                <div class="absolute w-full h-full backface-hidden bg-blue-50 border-2 border-blue-200 rounded-xl flex flex-col items-center justify-center p-6 text-center shadow-sm">
                    <span class="text-blue-500 font-semibold tracking-wider text-xs uppercase mb-2 bg-blue-100 px-2.5 py-0.5 rounded-full">Truth</span>
                    <p id="prompt-text-front" class="text-lg font-medium text-gray-800">What is the most embarrassing text you've sent recently?</p>
                </div>

                <!-- Back of Card (Dare) -->
                <div class="absolute w-full h-full backface-hidden rotate-y-180 bg-red-50 border-2 border-red-200 rounded-xl flex flex-col items-center justify-center p-6 text-center shadow-sm">
                    <span class="text-red-500 font-semibold tracking-wider text-xs uppercase mb-2 bg-red-100 px-2.5 py-0.5 rounded-full">Dare</span>
                    <p id="prompt-text-back" class="text-lg font-medium text-gray-800">Send an embarrassing text to the third person in your contacts.</p>
                </div>

            </div>
        </div>

        <!-- Controls Area -->
        <div class="w-full flex gap-3">
            <button id="generate-btn" class="flex-1 bg-gray-900 text-white py-3 rounded-xl font-semibold text-sm hover:bg-gray-800 transition-colors shadow-sm">
                New Prompt
            </button>
            <button id="convert-btn" class="flex-1 bg-gradient-to-r from-blue-600 to-red-600 text-white py-3 rounded-xl font-semibold text-sm hover:opacity-95 transition-opacity shadow-sm">
                Convert to Dare
            </button>
        </div>

    </div>

    <!-- Link to Javascript file -->
    <script src="app.js"></script>
</body>
</html>
